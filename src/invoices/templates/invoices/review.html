{% extends "invoices/base.html" %}
{% block content %}
<div class="card">
  <h1>Human Review</h1>
  <p>Correct low-confidence or suspicious extraction results before export.</p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn" type="submit">Approve and save</button>
  </form>
</div>
<div class="card">
  <h2>Extraction Evidence</h2>
  <pre>{{ extraction.evidence }}</pre>
  <h2>Anomalies</h2>
  <pre>{{ extraction.anomalies }}</pre>
</div>
{% endblock %}
